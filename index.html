<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piscines Aix Services | L'excellence Aixoise</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050B14; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        input::placeholder { color: rgba(255, 255, 255, 0.2); transition: color 0.3s; }
        input:focus::placeholder { color: transparent; }
    </style>
</head>
<body class="bg-[#050B14] text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LogoAix = ({ light = true, className = "" }) => (
            <div className={`flex items-center gap-2 sm:gap-3 group cursor-pointer ${className}`}>
                <div className="relative w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center">
                    <svg viewBox="0 0 100 100" className="w-full h-full">
                        <defs>
                            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style={{ stopColor: '#D4AF37', stopOpacity: 1 }} />
                                <stop offset="100%" style={{ stopColor: '#F2D479', stopOpacity: 1 }} />
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="45" fill="none" stroke={light ? "white" : "#0A192F"} strokeWidth="0.5" opacity="0.2" />
                        <path d="M30 65 C 40 40, 60 40, 70 65 M35 55 C 45 45, 55 45, 65 55" fill="none" stroke="url(#goldGrad)" strokeWidth="4" strokeLinecap="round" className="transition-all group-hover:stroke-white" />
                        <circle cx="50" cy="35" r="3" fill="url(#goldGrad)" />
                    </svg>
                </div>
                <div className="flex flex-col leading-none">
                    <span className={`text-lg sm:text-xl font-bold tracking-[0.2em] uppercase ${light ? 'text-white' : 'text-slate-900'}`}>Aix Services</span>
                    <span className="text-[6px] sm:text-[7px] font-medium tracking-[0.5em] uppercase text-[#D4AF37] mt-1">L'Art de la Piscine</span>
                </div>
            </div>
        );

        const EditorialImage = ({ src, alt, className = "" }) => {
            const [loading, setLoading] = useState(true);
            return (
                <div className={`relative overflow-hidden bg-[#0A192F] flex items-center justify-center ${className}`}>
                    {loading && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 z-0">
                            <i className="fa-solid fa-circle-notch fa-spin text-[#D4AF37] text-xl"></i>
                        </div>
                    )}
                    <img 
                        src={src} 
                        alt={alt} 
                        onLoad={() => setLoading(false)}
                        className={`w-full h-full object-cover transition-all duration-1000 relative z-10 ${loading ? 'opacity-0 scale-110' : 'opacity-100 scale-100'}`} 
                        crossOrigin="anonymous"
                    />
                </div>
            );
        };

        const App = () => {
            const [step, setStep] = useState(0);
            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) element.scrollIntoView({ behavior: 'smooth' });
                setMobileMenuOpen(false);
            };

            const ButtonCTA = ({ children, onClick, variant = 'primary', className = "" }) => {
                const styles = {
                    primary: "bg-[#D4AF37] hover:bg-[#F2D479] text-[#0A192F] shadow-[0_10px_30px_rgba(212,175,55,0.2)]",
                    outline: "border border-white/20 hover:border-[#D4AF37] text-white hover:bg-white/5"
                };
                return (
                    <button onClick={onClick} className={`px-6 sm:px-10 py-4 sm:py-5 rounded-full font-bold uppercase tracking-[0.2em] text-[9px] sm:text-[10px] transition-all active:scale-95 flex items-center justify-center gap-3 ${styles[variant]} ${className}`}>
                        {children}
                    </button>
                );
            };

            return (
                <div>
                    <div className={`fixed inset-0 z-[100] bg-[#050B14] transition-all duration-500 lg:hidden ${mobileMenuOpen ? 'translate-x-0 opacity-100' : 'translate-x-full opacity-0 pointer-events-none'}`}>
                        <div className="flex flex-col h-full p-8">
                            <div className="flex justify-between items-center mb-16">
                                <LogoAix />
                                <button onClick={() => setMobileMenuOpen(false)} className="p-2 text-[#D4AF37]"><i className="fa-solid fa-xmark text-2xl"></i></button>
                            </div>
                            <div className="flex flex-col gap-10">
                                {['Expertise', 'Portfolio', 'Contact'].map(item => (
                                    <button key={item} onClick={() => scrollToSection(item.toLowerCase())} className="text-4xl font-light uppercase tracking-tighter text-left hover:text-[#D4AF37] transition-all">{item}</button>
                                ))}
                                <ButtonCTA className="mt-6 py-6" onClick={() => scrollToSection('devis')}>Devis en ligne</ButtonCTA>
                            </div>
                        </div>
                    </div>

                    <nav className={`fixed top-0 left-0 w-full z-[80] px-6 sm:px-10 transition-all duration-500 ${scrolled ? 'py-3 sm:py-4 bg-[#050B14]/95 backdrop-blur-xl border-b border-white/5 shadow-2xl' : 'py-6 sm:py-10'}`}>
                        <div className="max-w-screen-2xl mx-auto flex justify-between items-center">
                            <LogoAix />
                            <div className="hidden lg:flex items-center gap-12">
                                {['Expertise', 'Portfolio', 'Contact'].map(item => (
                                    <button key={item} onClick={() => scrollToSection(item.toLowerCase())} className="text-[10px] font-bold uppercase tracking-[0.4em] text-white/50 hover:text-[#D4AF37] transition-all">{item}</button>
                                ))}
                                <ButtonCTA variant="outline" className="px-6 py-3" onClick={() => scrollToSection('devis')}>Devis en ligne</ButtonCTA>
                            </div>
                            <button className="lg:hidden p-2 text-[#D4AF37]" onClick={() => setMobileMenuOpen(true)}><i className="fa-solid fa-bars text-2xl"></i></button>
                        </div>
                    </nav>

                    <section className="relative min-h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <EditorialImage src="https://images.unsplash.com/photo-1576013551627-0cc20b96c2a7?q=80&w=2000&auto=format&fit=crop" alt="Piscine de luxe" className="w-full h-full opacity-60" />
                            <div className="absolute inset-0 bg-gradient-to-b from-[#050B14]/80 via-transparent to-[#050B14]"></div>
                        </div>
                        <div className="relative z-10 max-w-5xl mx-auto text-center px-6 sm:px-10 pt-20">
                            <h1 className="text-4xl sm:text-6xl md:text-8xl lg:text-[9rem] font-bold leading-[0.9] tracking-tighter uppercase mb-8 sm:mb-12">L'excellence <br /><span className="text-[#D4AF37] italic font-serif">Aixoise.</span></h1>
                            <p className="max-w-xl mx-auto text-slate-300 text-base sm:text-lg md:text-xl font-light mb-10 sm:mb-16 leading-relaxed">Maintenance technique, rénovation et dépannage express. <br className="hidden sm:block" /> Une expertise locale pour votre sérénité.</p>
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-6 w-full sm:w-auto">
                                <ButtonCTA className="w-full sm:w-auto" onClick={() => scrollToSection('devis')}>Démarrer un Devis <i className="fa-solid fa-arrow-right"></i></ButtonCTA>
                                <a href="tel:0769397960" className="w-full sm:w-auto"><ButtonCTA variant="outline" className="w-full sm:w-auto"><i className="fa-solid fa-phone"></i> Contact Direct</ButtonCTA></a>
                            </div>
                        </div>
                    </section>

                    <section id="expertise" className="py-20 sm:py-40 px-6 sm:px-10">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 lg:gap-32 items-center">
                            <div className="order-2 lg:order-1">
                                <h2 className="text-[9px] sm:text-[10px] font-bold uppercase tracking-[0.5em] text-[#D4AF37] mb-6 sm:mb-8">Savoir-faire Technique</h2>
                                <h3 className="text-3xl sm:text-4xl md:text-5xl font-light leading-tight mb-8 sm:mb-12 uppercase tracking-tighter">Une maîtrise <br /> <span className="italic font-serif">sans concession.</span></h3>
                                <div className="space-y-8 sm:space-y-12">
                                    <div className="flex gap-4 sm:gap-8 group">
                                        <div className="w-12 h-12 sm:w-16 sm:h-16 shrink-0 rounded-2xl bg-white/5 flex items-center justify-center text-[#D4AF37] group-hover:bg-[#D4AF37] group-hover:text-[#0A192F] transition-all"><i className="fa-solid fa-droplet text-xl"></i></div>
                                        <div><h4 className="text-lg sm:text-xl font-bold uppercase tracking-tight mb-2">Équilibre & Pureté</h4><p className="text-slate-400 text-sm sm:text-base font-light">Analyse moléculaire de l'eau pour une clarté et une douceur absolues.</p></div>
                                    </div>
                                    <div className="flex gap-4 sm:gap-8 group">
                                        <div className="w-12 h-12 sm:w-16 sm:h-16 shrink-0 rounded-2xl bg-white/5 flex items-center justify-center text-[#D4AF37] group-hover:bg-[#D4AF37] group-hover:text-[#0A192F] transition-all"><i className="fa-solid fa-shield-halved text-xl"></i></div>
                                        <div><h4 className="text-lg sm:text-xl font-bold uppercase tracking-tight mb-2">Rénovation & Liner</h4><p className="text-slate-400 text-sm sm:text-base font-light">Pose experte de membranes armées 150/100e et détection de fuites.</p></div>
                                    </div>
                                    <div className="flex gap-4 sm:gap-8 group">
                                        <div className="w-12 h-12 sm:w-16 sm:h-16 shrink-0 rounded-2xl bg-white/5 flex items-center justify-center text-[#D4AF37] group-hover:bg-[#D4AF37] group-hover:text-[#0A192F] transition-all"><i className="fa-solid fa-wrench text-xl"></i></div>
                                        <div><h4 className="text-lg sm:text-xl font-bold uppercase tracking-tight mb-2">Technicité & Sav</h4><p className="text-slate-400 text-sm sm:text-base font-light">Interventions rapides sur pompes, filtration et domotique de bassin.</p></div>
                                    </div>
                                </div>
                            </div>
                            <div className="relative order-1 lg:order-2 mb-10 lg:mb-0">
                                <div className="absolute -inset-6 sm:-inset-10 bg-[#D4AF37]/5 blur-[60px] rounded-full"></div>
                                <EditorialImage src="https://images.unsplash.com/photo-1583316174775-bd6dc0e9f298?q=80&w=800&auto=format&fit=crop" alt="Technique" className="aspect-[3/4] rounded-3xl relative z-10 border border-white/5" />
                                <div className="absolute -bottom-6 -left-4 sm:top-10 sm:-right-10 bg-white/5 backdrop-blur-2xl p-6 sm:p-10 rounded-2xl border border-white/10 z-20 shadow-2xl">
                                    <div className="text-3xl sm:text-4xl font-bold text-[#D4AF37] mb-1">4.9/5</div>
                                    <div className="text-[8px] sm:text-[10px] font-black uppercase tracking-widest text-white/40">Note Google Maps</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="portfolio" className="py-20 sm:py-40 px-6 sm:px-10 bg-white/[0.02]">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-12 sm:mb-20 gap-6">
                                <div>
                                    <h2 className="text-4xl sm:text-6xl font-light uppercase tracking-tighter">Réalisations</h2>
                                    <div className="h-1 w-20 sm:w-24 bg-[#D4AF37] mt-4 sm:mt-6"></div>
                                </div>
                                <i className="fa-solid fa-camera text-[#D4AF37] opacity-20 hidden sm:block text-5xl"></i>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-10">
                                <div className="space-y-6 sm:space-y-10">
                                    <EditorialImage src="https://images.unsplash.com/photo-1519710164239-da123dc03ef4?q=80&w=800&auto=format&fit=crop" alt="Piscine 1" className="aspect-[16/9] rounded-3xl" />
                                    <EditorialImage src="https://images.unsplash.com/photo-1538083024336-555cf8943f4b?q=80&w=800&auto=format&fit=crop" alt="Piscine 2" className="aspect-square rounded-3xl" />
                                </div>
                                <div className="space-y-6 sm:space-y-10 md:pt-20">
                                    <EditorialImage src="https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?q=80&w=800&auto=format&fit=crop" alt="Piscine 3" className="aspect-square rounded-3xl" />
                                    <EditorialImage src="https://images.unsplash.com/photo-1600566752229-25039df28014?q=80&w=800&auto=format&fit=crop" alt="Piscine 4" className="aspect-[16/9] rounded-3xl" />
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="devis" className="py-20 sm:py-40 px-6 sm:px-10">
                        <div className="max-w-4xl mx-auto">
                            <div className="text-center mb-12 sm:mb-24">
                                <h2 className="text-[9px] sm:text-[10px] font-bold uppercase tracking-[0.5em] text-[#D4AF37] mb-6 sm:mb-8">Consultation Signature</h2>
                                <h3 className="text-3xl sm:text-5xl md:text-6xl font-light uppercase tracking-tighter mb-6 sm:mb-8 leading-tight">Projetez votre bassin.</h3>
                            </div>
                            <div className="bg-[#0A192F] border border-white/10 rounded-[2rem] sm:rounded-[3rem] p-8 sm:p-16 md:p-20 relative overflow-hidden shadow-2xl">
                                <div className="absolute top-0 left-0 h-1 bg-[#D4AF37] transition-all duration-1000" style={{ width: `${(step + 1) * 33.3}%` }} />
                                {step === 0 && (
                                    <div>
                                        <h4 className="text-xl sm:text-2xl font-light uppercase mb-8 sm:mb-12">Quel est votre besoin ?</h4>
                                        <div className="grid grid-cols-1 gap-3 sm:gap-4">
                                            {['Rénovation & Étanchéité', 'Maintenance Annuelle', 'Urgence Technique', 'Diagnostic Fuite'].map(q => (
                                                <button key={q} onClick={() => setStep(1)} className="p-6 sm:p-8 rounded-xl sm:rounded-2xl border border-white/5 bg-white/5 hover:border-[#D4AF37] hover:bg-[#D4AF37]/10 transition-all text-left flex justify-between items-center group">
                                                    <span className="text-base sm:text-lg font-bold tracking-tight uppercase">{q}</span>
                                                    <i className="fa-solid fa-chevron-right text-[#D4AF37] opacity-50 group-hover:opacity-100"></i>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {step === 1 && (
                                    <div className="space-y-8 sm:space-y-10">
                                        <h4 className="text-xl sm:text-2xl font-light uppercase">Vos Informations</h4>
                                        <div className="grid gap-6 sm:gap-8">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8">
                                                <input type="text" placeholder="NOM COMPLET" className="bg-transparent border-b border-white/10 py-4 sm:py-5 text-[10px] sm:text-xs font-bold tracking-widest outline-none focus:border-[#D4AF37] uppercase" />
                                                <input type="tel" placeholder="TÉLÉPHONE" className="bg-transparent border-b border-white/10 py-4 sm:py-5 text-[10px] sm:text-xs font-bold tracking-widest outline-none focus:border-[#D4AF37] uppercase" />
                                            </div>
                                            <input type="text" placeholder="VILLE" className="w-full bg-transparent border-b border-white/10 py-4 sm:py-5 text-[10px] sm:text-xs font-bold tracking-widest outline-none focus:border-[#D4AF37] uppercase" />
                                        </div>
                                        <div className="flex flex-col sm:flex-row gap-4 sm:gap-6 pt-6 sm:pt-10">
                                            <button onClick={() => setStep(0)} className="w-full sm:w-auto p-4 sm:p-5 rounded-full border border-white/10 hover:bg-white/5"><i className="fa-solid fa-chevron-left"></i></button>
                                            <ButtonCTA className="flex-1" onClick={() => setStep(2)}>Finaliser ma demande</ButtonCTA>
                                        </div>
                                    </div>
                                )}
                                {step === 2 && (
                                    <div className="py-10 sm:py-20 text-center">
                                        <div className="w-20 h-20 sm:w-24 sm:h-24 bg-[#D4AF37]/10 rounded-full flex items-center justify-center mx-auto mb-8 sm:mb-10"><i className="fa-solid fa-envelope text-[#D4AF37] text-3xl"></i></div>
                                        <h4 className="text-2xl sm:text-3xl font-light uppercase mb-4 sm:mb-6 tracking-tight">C'est envoyé.</h4>
                                        <p className="text-slate-400 font-light text-sm sm:text-base max-w-xs mx-auto mb-10 sm:mb-12">M. Soquet vous recontactera sous 24h.</p>
                                        <button onClick={() => setStep(0)} className="text-[9px] sm:text-[10px] font-bold text-[#D4AF37] hover:text-white uppercase tracking-[0.4em] underline underline-offset-8">Réinitialiser</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    <footer id="contact" className="py-20 px-6 sm:px-10 border-t border-white/5">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-start gap-16 lg:gap-20 mb-20 sm:mb-32">
                            <LogoAix />
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12 sm:gap-16 w-full lg:w-auto">
                                <div className="space-y-4 sm:space-y-6">
                                    <h5 className="text-[9px] sm:text-[10px] font-black uppercase tracking-[0.4em] text-[#D4AF37]">Localisation</h5>
                                    <div className="flex items-start gap-3 text-slate-400 text-xs font-light"><i className="fa-solid fa-location-dot text-[#D4AF37] mt-1"></i><span>100 Av. de Lattre de Tassigny <br /> 13090 Aix-en-Provence</span></div>
                                </div>
                                <div className="space-y-4 sm:space-y-6">
                                    <h5 className="text-[9px] sm:text-[10px] font-black uppercase tracking-[0.4em] text-[#D4AF37]">Direct</h5>
                                    <div className="flex items-center gap-3 text-slate-400 text-xs font-light"><i className="fa-solid fa-phone text-[#D4AF37]"></i><span className="text-white font-bold">07 69 39 79 60</span></div>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
